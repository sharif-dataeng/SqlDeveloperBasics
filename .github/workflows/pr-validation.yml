name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for valid file extensions
        run: |
          echo "Checking changed files for valid extensions..."
          INVALID_FILES=$(git diff --name-only origin/main...HEAD | grep -vE '\.(sql|csv|md|txt|json|yml|yaml|ppt|pptx|pdf|png|jpg)$' || true)
          if [ -n "$INVALID_FILES" ]; then
            echo "::warning::The following files have unusual extensions:"
            echo "$INVALID_FILES"
          fi
          echo "File extension check complete."

      - name: Check SQL files for basic syntax
        run: |
          echo "Running basic SQL file checks..."
          EXIT_CODE=0
          for file in $(git diff --name-only origin/main...HEAD | grep '\.sql$'); do
            if [ -f "$file" ]; then
              # Check for empty files
              if [ ! -s "$file" ]; then
                echo "::error file=$file::SQL file is empty"
                EXIT_CODE=1
              fi
              # Check file is valid UTF-8
              if ! iconv -f UTF-8 -t UTF-8 "$file" > /dev/null 2>&1; then
                echo "::warning file=$file::File may contain non-UTF-8 characters"
              fi
            fi
          done
          exit $EXIT_CODE

      - name: PR Validation Summary
        run: echo "PR validation checks passed!"
